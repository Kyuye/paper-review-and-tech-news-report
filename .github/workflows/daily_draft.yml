name: Daily GitBook Candidate Pack (KST 18:00, weekdays)

on:
  schedule:
    # 18:00 Asia/Seoul == 09:00 UTC
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      run_datetime_override:
        description: "ISO datetime override (e.g. 2026-03-05T18:00:00+09:00)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: daily-draft
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate candidate pack
        env:
          RUN_DATETIME_OVERRIDE: ${{ github.event.inputs.run_datetime_override }}
        run: |
          python -m tools.publisher.run_draft

      - name: Detect no-op
        id: noop
        run: |
          if [ ! -f previews/draft_meta.json ]; then
            echo "no_draft=true" >> "$GITHUB_OUTPUT"
            echo "No draft generated for this run (likely non-scheduled day)."
            exit 0
          fi
          echo "no_draft=false" >> "$GITHUB_OUTPUT"

      - name: Read PR metadata
        id: meta
        if: ${{ steps.noop.outputs.no_draft == 'false' }}
        run: |
          python - <<'PY'
          import json, os, pathlib
          meta = json.loads(pathlib.Path("previews/draft_meta.json").read_text(encoding="utf-8"))
          ctx = meta.get("ctx") or {}
          date_str = ctx.get("date_str", "unknown")
          kind = ctx.get("kind", "unknown")
          title = pathlib.Path("previews/pr/latest_title.txt").read_text(encoding="utf-8").strip()
          body = pathlib.Path("previews/pr/latest_body.md").read_text(encoding="utf-8").strip()
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as f:
              f.write(f"date={date_str}\n")
              f.write(f"kind={kind}\n")
              f.write(f"branch_name=draft/{date_str}-{kind}\n")
              f.write("title<<EOF\n" + title + "\nEOF\n")
              f.write("body<<EOF\n" + body + "\nEOF\n")
          PY

      - name: Create/Update PR
        id: cpr
        if: ${{ steps.noop.outputs.no_draft == 'false' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: candidate pack ${{ steps.meta.outputs.date }} (${{ steps.meta.outputs.kind }})"
          branch: "${{ steps.meta.outputs.branch_name }}"
          delete-branch: true
          title: "${{ steps.meta.outputs.title }}"
          body: "${{ steps.meta.outputs.body }}"
          labels: "candidate-pack,auto"

      - name: Resolve PR URL
        id: prurl
        if: ${{ steps.noop.outputs.no_draft == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          CPR_PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          BRANCH_NAME: ${{ steps.meta.outputs.branch_name }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          pr_url = (os.getenv("CPR_PR_URL") or "").strip()
          if not pr_url:
              repo = os.environ["GITHUB_REPOSITORY"]
              owner = os.environ["REPOSITORY_OWNER"]
              branch = os.environ["BRANCH_NAME"]
              head = urllib.parse.quote(f"{owner}:{branch}", safe="")
              url = f"https://api.github.com/repos/{repo}/pulls?state=open&head={head}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "daily-gitbook-candidate-pack",
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              if payload:
                  pr_url = (payload[0].get("html_url") or "").strip()

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"pr_url={pr_url}\n")
          PY

      - name: Discord notify (PR link)
        if: ${{ steps.prurl.outputs.pr_url != '' && steps.noop.outputs.no_draft == 'false' }}
        env:
          PULL_REQUEST_URL: ${{ steps.prurl.outputs.pr_url }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m tools.publisher.send_preview_discord
